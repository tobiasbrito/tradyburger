<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bot Demo | Tradi Burgerrr</title>
  <link rel="stylesheet" href="../assets/css/bot.css">
</head>
<body>
  <main class="bot-shell">
    <header>
      <img src="../assets/tradi-bot-avatar.png" alt="Tradi">
      <div>
        <h1>Tradi Bot Demo</h1>
        <p>Simulacion de toma de pedidos con productos y precios desde la misma base.</p>
      </div>
    </header>
    <section class="phone">
      <div class="messages" id="messages"></div>
      <form class="composer" id="botForm">
        <input id="botInput" autocomplete="off" placeholder="Escribi aca...">
        <button type="submit">Enviar</button>
      </form>
    </section>
  </main>
  <script type="module" src="../assets/js/bot-demo.js"></script>
</body>
</html>
